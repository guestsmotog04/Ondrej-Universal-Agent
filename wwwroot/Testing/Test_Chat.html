<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Test — Thio Agent</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ---- Header ---- */
        header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 10px 20px;
            background-color: #1a1a1a;
            border-bottom: 1px solid #333;
            flex-shrink: 0;
        }

        header h1 { font-size: 16px; font-weight: 600; color: #e0e0e0; }

        header a { font-size: 13px; color: #4a9eff; text-decoration: none; }
        header a:hover { text-decoration: underline; }

        /* ---- Config bar ---- */
        #config-bar {
            display: flex;
            gap: 12px;
            align-items: center;
            padding: 8px 20px;
            background-color: #161616;
            border-bottom: 1px solid #2a2a2a;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        #config-bar label { font-size: 12px; color: #888; white-space: nowrap; }

        #config-bar input {
            background-color: #2d2d2d;
            color: #e0e0e0;
            border: 1px solid #404040;
            border-radius: 4px;
            padding: 5px 10px;
            font-size: 13px;
            font-family: inherit;
        }

        #config-bar input:focus { outline: none; border-color: #4a9eff; }

        #apiKeyInput { width: 300px; }
        #modelInput  { width: 180px; }

        .config-hint { font-size: 11px; color: #555; }

        /* ---- Messages area ---- */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .msg-row {
            display: flex;
            flex-direction: column;
        }

        .msg-row.user  { align-items: flex-end; }
        .msg-row.ai    { align-items: flex-start; }
        .msg-row.error { align-items: flex-start; }
        .msg-row.system { align-items: center; }

        .msg-label {
            font-size: 11px;
            color: #555;
            margin-bottom: 3px;
            padding: 0 4px;
        }

        .bubble {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .bubble.user {
            background-color: #1e3a5f;
            border: 1px solid #2a5080;
            color: #d0e8ff;
        }

        .bubble.ai {
            background-color: #1e1e1e;
            border: 1px solid #333;
            color: #e0e0e0;
        }

        .bubble.error {
            background-color: #2d1515;
            border: 1px solid #5c2020;
            color: #ff7070;
        }

        .bubble.system {
            background: none;
            border: none;
            color: #555;
            font-size: 12px;
            font-style: italic;
            padding: 4px;
        }

        /* Thinking dots */
        .thinking {
            display: flex;
            gap: 5px;
            align-items: center;
            padding: 12px 14px;
        }

        .thinking span {
            width: 7px;
            height: 7px;
            background-color: #4a9eff;
            border-radius: 50%;
            animation: bounce 1.2s infinite ease-in-out;
        }

        .thinking span:nth-child(2) { animation-delay: 0.2s; }
        .thinking span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.7); opacity: 0.35; }
            40%            { transform: scale(1);   opacity: 1; }
        }

        /* ---- Input bar ---- */
        #input-bar {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 10px 20px;
            background-color: #1a1a1a;
            border-top: 1px solid #333;
            flex-shrink: 0;
        }

        #input-row {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        #promptInput {
            flex: 1;
            background-color: #2d2d2d;
            color: #e0e0e0;
            border: 1px solid #404040;
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            min-height: 42px;
            max-height: 160px;
            line-height: 1.4;
        }

        #promptInput:focus { outline: none; border-color: #4a9eff; }

        button {
            font-family: inherit;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            padding: 10px 16px;
            transition: background-color 0.15s;
        }

        #sendBtn {
            background-color: #1a4a7a;
            color: #d0e8ff;
            border: 1px solid #2a5080;
            white-space: nowrap;
        }

        #sendBtn:hover:not(:disabled) { background-color: #215a96; }

        #sendBtn:disabled { opacity: 0.45; cursor: not-allowed; }

        #clearBtn {
            background-color: #2d2d2d;
            color: #888;
            border: 1px solid #404040;
        }

        #clearBtn:hover { background-color: #3a3a3a; color: #ccc; }

        #attachBtn {
            background-color: #2d2d2d;
            color: #888;
            border: 1px solid #404040;
            flex-shrink: 0;
        }

        #attachBtn:hover { background-color: #3a3a3a; color: #ccc; }
        #attachBtn.has-image { color: #4a9eff; border-color: #4a9eff; }

        #img-preview-row {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
        }

        #img-thumbnail {
            height: 60px;
            border-radius: 4px;
            border: 1px solid #404040;
            object-fit: cover;
            max-width: 120px;
        }

        #removeImgBtn {
            background: #2d1515;
            border: 1px solid #5c2020;
            color: #ff9090;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
        }

        #removeImgBtn:hover { background-color: #5c2020; color: #ffcccc; }

        .bubble-img {
            display: block;
            max-width: 100%;
            max-height: 180px;
            border-radius: 4px;
            margin-bottom: 6px;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <header>
        <h1>🧪 Chat Test</h1>
        <a href="/">← Viewport</a>
    </header>

    <div id="config-bar">
        <label for="apiKeyInput">API Key</label>
        <input type="password" id="apiKeyInput" placeholder="Leave blank to use server config" autocomplete="off" spellcheck="false" />
        <label for="modelInput">Model</label>
        <input type="text" id="modelInput" value="gemini-2.0-flash" spellcheck="false" />
        <span class="config-hint">Key is stored in localStorage and sent per-request — never persisted server-side.</span>
    </div>

    <div id="messages"></div>

    <div id="input-bar">
        <div id="img-preview-row">
            <img id="img-thumbnail" alt="attached" />
            <button id="removeImgBtn">✕ Remove</button>
        </div>
        <div id="input-row">
            <input type="file" id="fileInput" accept="image/*" style="display:none" />
            <button id="attachBtn" title="Attach image (or paste Ctrl+V)">📎</button>
            <textarea id="promptInput" placeholder="Type a prompt… (Ctrl+Enter to send)" rows="1"></textarea>
            <button id="clearBtn">Clear</button>
            <button id="sendBtn">Send</button>
        </div>
    </div>

    <script>
        const messagesEl    = document.getElementById('messages');
        const promptInput   = document.getElementById('promptInput');
        const sendBtn       = document.getElementById('sendBtn');
        const clearBtn      = document.getElementById('clearBtn');
        const apiKeyInput   = document.getElementById('apiKeyInput');
        const modelInput    = document.getElementById('modelInput');
        const fileInput     = document.getElementById('fileInput');
        const attachBtn     = document.getElementById('attachBtn');
        const imgPreviewRow = document.getElementById('img-preview-row');
        const imgThumbnail  = document.getElementById('img-thumbnail');
        const removeImgBtn  = document.getElementById('removeImgBtn');

        let currentConversationId = null;

        // Restore config from localStorage so it survives page refreshes.
        apiKeyInput.value = localStorage.getItem('test_apiKey') || '';
        modelInput.value  = localStorage.getItem('test_model')  || 'gemini-2.0-flash';

        apiKeyInput.addEventListener('change', () => localStorage.setItem('test_apiKey', apiKeyInput.value));
        modelInput.addEventListener('change',  () => localStorage.setItem('test_model',  modelInput.value));

        appendSystem('Session started. Ctrl+Enter to send.');

        // ---- DOM helpers ----

        function appendSystem(text) {
            const row = document.createElement('div');
            row.className = 'msg-row system';
            const bubble = document.createElement('div');
            bubble.className = 'bubble system';
            bubble.textContent = text;
            row.appendChild(bubble);
            messagesEl.appendChild(row);
            scrollToBottom();
        }

        function appendBubble(role, text, imageDataUrl = null) {
            const row = document.createElement('div');
            row.className = `msg-row ${role}`;

            if (role !== 'system') {
                const label = document.createElement('div');
                label.className = 'msg-label';
                label.textContent = role === 'user' ? 'You' : 'AI';
                row.appendChild(label);
            }

            const bubble = document.createElement('div');
            bubble.className = `bubble ${role}`;

            if (imageDataUrl) {
                const img = document.createElement('img');
                img.src = imageDataUrl;
                img.className = 'bubble-img';
                bubble.appendChild(img);
            }

            bubble.appendChild(document.createTextNode(text));
            row.appendChild(bubble);
            messagesEl.appendChild(row);
            scrollToBottom();
            return bubble;
        }

        function appendThinking() {
            const row = document.createElement('div');
            row.className = 'msg-row ai';

            const label = document.createElement('div');
            label.className = 'msg-label';
            label.textContent = 'AI';

            const bubble = document.createElement('div');
            bubble.className = 'bubble ai thinking';
            bubble.innerHTML = '<span></span><span></span><span></span>';

            row.appendChild(label);
            row.appendChild(bubble);
            messagesEl.appendChild(row);
            scrollToBottom();
            return row;
        }

        function scrollToBottom() {
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        // ---- Image attachment ----

        let attachedImage = null; // { base64, mimeType, dataUrl }

        function attachImageFromFile(file) {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = e => {
                    const dataUrl = e.target.result;
                    attachedImage = {
                        base64:   dataUrl.split(',')[1],
                        mimeType: file.type || 'image/jpeg',
                        dataUrl
                    };
                    imgThumbnail.src = dataUrl;
                    imgPreviewRow.style.display = 'flex';
                    attachBtn.classList.add('has-image');
                    resolve();
                };
                reader.readAsDataURL(file);
            });
        }

        function clearAttachedImage() {
            attachedImage = null;
            imgPreviewRow.style.display = 'none';
            imgThumbnail.src = '';
            fileInput.value = '';
            attachBtn.classList.remove('has-image');
        }

        // ---- Send logic ----

        async function sendPrompt() {
            const prompt = promptInput.value.trim();
            if (!prompt) return;

            const imageSnapshot = attachedImage;
            promptInput.value = '';
            promptInput.style.height = 'auto';
            sendBtn.disabled = true;
            clearAttachedImage();

            appendBubble('user', prompt, imageSnapshot?.dataUrl ?? null);
            const thinkingRow = appendThinking();

            try {
                const response = await fetch('/api/test/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt,
                        apiKey:         apiKeyInput.value.trim() || null,
                        model:          modelInput.value.trim()  || null,
                        imageBase64:    imageSnapshot?.base64    ?? null,
                        imageMimeType:  imageSnapshot?.mimeType  ?? null,
                        conversationId: currentConversationId
                    })
                });

                thinkingRow.remove();

                if (!response.ok) {
                    const body = await response.text();
                    appendBubble('error', `HTTP ${response.status}: ${body}`);
                    return;
                }

                const data = await response.json();

                if (data.conversationId && !currentConversationId) {
                    currentConversationId = data.conversationId;
                    appendSystem('\uD83D\uDD17 Conversation started — the AI will remember previous messages.');
                } else if (data.conversationId) {
                    currentConversationId = data.conversationId;
                }

                appendBubble('ai', data.text ?? data.Text ?? '(empty response)');

            } catch (err) {
                thinkingRow.remove();
                appendBubble('error', `Network error: ${err.message}`);
            } finally {
                sendBtn.disabled = false;
                promptInput.focus();
            }
        }

        sendBtn.addEventListener('click', sendPrompt);

        promptInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && e.ctrlKey) {
                e.preventDefault();
                sendPrompt();
            }
        });

        // Auto-expand the textarea as the user types.
        promptInput.addEventListener('input', () => {
            promptInput.style.height = 'auto';
            promptInput.style.height = Math.min(promptInput.scrollHeight, 160) + 'px';
        });

        clearBtn.addEventListener('click', async () => {
            if (currentConversationId) {
                try { await fetch(`/api/test/chat/${currentConversationId}`, { method: 'DELETE' }); } catch { /* best-effort */ }
                currentConversationId = null;
            }
            messagesEl.innerHTML = '';
            clearAttachedImage();
            appendSystem('Chat cleared.');
        });

        attachBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', async () => {
            if (fileInput.files[0]) await attachImageFromFile(fileInput.files[0]);
        });

        removeImgBtn.addEventListener('click', clearAttachedImage);

        // Paste an image directly from the clipboard.
        document.addEventListener('paste', async e => {
            const items = e.clipboardData?.items;
            if (!items) return;
            for (const item of items) {
                if (item.type.startsWith('image/')) {
                    e.preventDefault();
                    const file = item.getAsFile();
                    if (file) await attachImageFromFile(file);
                    break;
                }
            }
        });
    </script>

</body>
</html>
