<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuration — Thio Universal Agent</title>
    <link rel="stylesheet" href="/css/shared.css">
    <link rel="stylesheet" href="/css/config.css">
</head>
<body>

<header>
    <a href="/">← Home</a>
    <h1>Configuration</h1>
</header>

<div class="action-bar">
    <button class="btn btn-primary" id="btn-save">Save to browser</button>
    <button class="btn" id="btn-export">Export Settings</button>
    <label class="export-vault-label" id="export-vault-label" title="Include encrypted API keys in the export. You will need your vault password to decrypt them after importing.">
        <input type="checkbox" id="chk-export-vault"> Include encrypted keys
    </label>
    <button class="btn" id="btn-import">Import Settings</button>
    <input type="file" id="file-import" accept=".json" style="display:none">
    <div class="spacer"></div>
    <span class="status-badge" id="save-status">Loading…</span>
    <button class="btn btn-danger" id="btn-reset">Reset all to defaults</button>
</div>

<main id="config-main">
    <div class="config-columns">
        <div class="config-column" id="col-left"></div>
        <div class="config-column" id="col-right"></div>
    </div>
    <div id="col-bottom"></div>
</main>

<div id="toast">Saved</div>

<div id="modal-overlay">
    <div id="modal-box">
        <h3>Reset all settings?</h3>
        <p>This will clear every setting saved in the browser and reload the server defaults. This cannot be undone.</p>
        <div class="modal-actions">
            <button class="btn" id="modal-cancel">Cancel</button>
            <button class="btn btn-danger" id="modal-confirm-erase">Reset + Erase API Keys</button>
            <button class="btn btn-danger" id="modal-confirm">Reset</button>
        </div>
    </div>
</div>

<script type="module" src="/js/config.js"></script>

</body>
</html>
