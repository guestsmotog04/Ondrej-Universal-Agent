<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coordinate Prompt Test — Thio Agent</title>
    <link rel="stylesheet" href="/css/shared.css">
    <link rel="stylesheet" href="/css/testing-common.css">
    <link rel="stylesheet" href="/css/testing-coord.css">
</head>
<body>

    <header>
        <h1>🎯 Coordinate Prompt Test</h1>
        <a href="/">← Home</a>
        <a href="/Testing/Test_Chat.html">Chat Test</a>
        <span id="model-badge" style="font-size:11px;color:#4a6a8a;font-family:'Cascadia Code','Consolas',monospace;margin-left:8px;"></span>
        <a href="/Config.html" style="margin-left:auto;font-size:12px;color:#888;text-decoration:none;border:1px solid #333;border-radius:4px;padding:4px 10px;" title="Open Configuration">⚙ Config</a>
    </header>

    <div id="config-bar">
        <label for="coordinateModeSelect">Coord Mode</label>
        <select id="coordinateModeSelect">
            <option value="DirectAutoNormalize">DirectAutoNormalize (default)</option>
            <option value="Direct">Direct</option>
            <option value="Zoom">Zoom</option>
        </select>
    </div>

    <div id="input-panel">
        <div id="screenshot-area">
            <div id="drop-zone">Drop a screenshot here, paste from clipboard, or use the buttons below</div>
            <img id="screenshot-preview" alt="screenshot" />
            <div id="screenshot-controls">
                <button class="btn-secondary" id="captureBtn">📸 Capture Screen</button>
                <button class="btn-secondary" id="uploadBtn">📁 Upload Image</button>
                <input type="file" id="fileInput" accept="image/*" style="display:none" />
                <button class="btn-secondary" id="previewGridBtn" disabled>🔲 Preview Grid</button>
                <button class="btn-danger" id="clearScreenshotBtn" style="display:none">✕ Clear</button>
            </div>
        </div>
        <div id="prompt-area">
            <label for="itemInput">What to find on screen:</label>
            <textarea id="itemInput" placeholder="e.g. the Chrome icon in the taskbar"></textarea>
            <button class="btn-primary" id="runBtn" disabled>▶ Run Coordinate Prompt</button>
        </div>
    </div>

    <div id="grid-preview-panel" style="display:none; padding: 16px 20px; background-color: #161616; border-bottom: 1px solid #2a2a2a;">
        <div style="font-size: 12px; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;">Grid Overlay Preview</div>
        <img id="grid-preview-img" alt="grid preview" style="max-width: 100%; max-height: 350px; border-radius: 4px; border: 1px solid #333; object-fit: contain; background-color: #000; cursor: pointer;" />
    </div>

    <div id="loading">
        <div class="spinner"><span></span><span></span><span></span></div>
        <div class="loading-text">Running coordinate prompt… this involves multiple AI calls and may take a moment.</div>
    </div>

    <div id="results-panel" style="display:none">
        <h2>Iteration Steps</h2>
        <div id="steps-container"></div>
        <div id="final-result"></div>
    </div>

    <div id="lightbox"><img id="lightbox-img" alt="full size" /></div>

    <script>
        // @ts-nocheck
        const dropZone         = document.getElementById('drop-zone');
        const preview          = document.getElementById('screenshot-preview');
        const captureBtn       = document.getElementById('captureBtn');
        const uploadBtn        = document.getElementById('uploadBtn');
        const fileInput        = document.getElementById('fileInput');
        const clearBtn         = document.getElementById('clearScreenshotBtn');
        const previewGridBtn   = document.getElementById('previewGridBtn');
        const gridPreviewPanel = document.getElementById('grid-preview-panel');
        const gridPreviewImg   = document.getElementById('grid-preview-img');
        const itemInput        = document.getElementById('itemInput');
        const runBtn           = document.getElementById('runBtn');
        const loadingEl        = document.getElementById('loading');
        const resultsPanel     = document.getElementById('results-panel');
        const stepsContainer   = document.getElementById('steps-container');
        const finalResultEl    = document.getElementById('final-result');
        const lightbox         = document.getElementById('lightbox');
        const lightboxImg      = document.getElementById('lightbox-img');
        const apiKeyInput      = null; // removed — config read from tua_config_v1
        const modelInput       = null; // removed — config read from tua_config_v1
        const coordinateModeSelect = document.getElementById('coordinateModeSelect');

        const CONFIG_KEY = 'tua_config_v1';
        function getStoredConfig() {
            try { return JSON.parse(localStorage.getItem(CONFIG_KEY) || '{}'); } catch { return {}; }
        }

        // Maps AiProviderType enum name to its localStorage section key and display name.
        const PROVIDER_SECTION_MAP = { 'Gemini': 'gemini', 'ChatGPT': 'openai', 'Claude': 'anthropic' };

        /**
         * Returns the active provider name (e.g. 'Gemini'), its localStorage section key,
         * and the apiKey/model values from stored config.
         */
        function getActiveProviderConfig() {
            const cfg = getStoredConfig();
            const providerName = cfg?.general?.activeProvider ?? null;
            const sectionKey  = providerName ? (PROVIDER_SECTION_MAP[providerName] ?? null) : null;
            return {
                providerName,
                apiKey: sectionKey ? (cfg?.[sectionKey]?.apiKey || null) : null,
                model:  sectionKey ? (cfg?.[sectionKey]?.model  || null) : null,
            };
        }

        // Show current model in header badge
        (async () => {
            try {
                const { providerName, model: storedModel } = getActiveProviderConfig();
                if (providerName && storedModel) {
                    document.getElementById('model-badge').textContent = `${providerName}: ${storedModel}`;
                } else {
                    const r = await fetch('/api/config');
                    if (r.ok) {
                        const d = await r.json();
                        const provider = d.general?.activeProvider ?? null;
                        const sectionKey = provider ? (PROVIDER_SECTION_MAP[provider] ?? null) : null;
                        const model = sectionKey ? d[sectionKey]?.model : null;
                        if (provider && model) document.getElementById('model-badge').textContent = `${provider}: ${model}`;
                    }
                }
            } catch {}
        })();

        let screenshotBase64 = null;

        // Restore coord mode
        coordinateModeSelect.value = localStorage.getItem('test_coordinateMode') || 'DirectAutoNormalize';

        coordinateModeSelect.addEventListener('change', () => localStorage.setItem('test_coordinateMode', coordinateModeSelect.value));

        // ---- Screenshot handling ----

        function loadScreenshotFromDataUrl(dataUrl) {
            screenshotBase64 = dataUrl.split(',')[1];
            preview.src = dataUrl;
            preview.style.display = 'block';
            dropZone.style.display = 'none';
            clearBtn.style.display = '';
            updateRunBtn();
        }

        function clearScreenshot() {
            screenshotBase64 = null;
            preview.src = '';
            preview.style.display = 'none';
            dropZone.style.display = '';
            clearBtn.style.display = 'none';
            fileInput.value = '';
            gridPreviewPanel.style.display = 'none';
            gridPreviewImg.src = '';
            updateRunBtn();
        }

        function updateRunBtn() {
            runBtn.disabled = !screenshotBase64 || !itemInput.value.trim();
            previewGridBtn.disabled = !screenshotBase64;
        }

        function loadFile(file) {
            const reader = new FileReader();
            reader.onload = e => loadScreenshotFromDataUrl(e.target.result);
            reader.readAsDataURL(file);
        }

        uploadBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });
        clearBtn.addEventListener('click', clearScreenshot);
        itemInput.addEventListener('input', updateRunBtn);

        captureBtn.addEventListener('click', async () => {
            captureBtn.disabled = true;
            captureBtn.textContent = '⏳ Capturing…';
            try {
                const resp = await fetch('/api/test/screenshot');
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const blob = await resp.blob();
                const reader = new FileReader();
                reader.onload = e => loadScreenshotFromDataUrl(e.target.result);
                reader.readAsDataURL(blob);
            } catch (err) {
                alert('Capture failed: ' + err.message);
            } finally {
                captureBtn.disabled = false;
                captureBtn.textContent = '📸 Capture Screen';
            }
        });

        // Drag & drop
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
        });

        // Paste
        document.addEventListener('paste', e => {
            const items = e.clipboardData?.items;
            if (!items) return;
            for (const item of items) {
                if (item.type.startsWith('image/')) {
                    e.preventDefault();
                    const file = item.getAsFile();
                    if (file) loadFile(file);
                    break;
                }
            }
        });

        // ---- Lightbox ----

        lightbox.addEventListener('click', () => lightbox.style.display = 'none');
        document.addEventListener('keydown', e => { if (e.key === 'Escape') lightbox.style.display = 'none'; });

        function openLightbox(src) {
            lightboxImg.src = src;
            lightbox.style.display = 'flex';
        }

        // ---- Preview Grid ----

        previewGridBtn.addEventListener('click', async () => {
            if (!screenshotBase64) return;
            previewGridBtn.disabled = true;
            previewGridBtn.textContent = '⏳ Generating…';
            try {
                const resp = await fetch('/api/test/make-grid-image', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ screenshotBase64, originX: 0, originY: 0 })
                });
                if (!resp.ok) {
                    const body = await resp.text();
                    alert('Grid preview failed: ' + body);
                    return;
                }
                const blob = await resp.blob();
                const url = URL.createObjectURL(blob);
                gridPreviewImg.src = url;
                gridPreviewPanel.style.display = '';
            } catch (err) {
                alert('Grid preview failed: ' + err.message);
            } finally {
                previewGridBtn.textContent = '🔲 Preview Grid';
                updateRunBtn();
            }
        });

        gridPreviewImg.addEventListener('click', () => openLightbox(gridPreviewImg.src));

        // ---- Run ----

        runBtn.addEventListener('click', runCoordinatePrompt);

        async function runCoordinatePrompt() {
            if (!screenshotBase64 || !itemInput.value.trim()) return;

            runBtn.disabled = true;
            loadingEl.style.display = '';
            resultsPanel.style.display = 'none';
            stepsContainer.innerHTML = '';
            finalResultEl.innerHTML = '';

            try {
                const resp = await fetch('/api/test/coordinate-prompt', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        screenshotBase64,
                        originX: 0,
                        originY: 0,
                        itemToIdentify: itemInput.value.trim(),
                        provider: getActiveProviderConfig().providerName,
                        apiKey:   getActiveProviderConfig().apiKey,
                        model:    getActiveProviderConfig().model,
                        mode:     coordinateModeSelect.value || null
                    })
                });

                loadingEl.style.display = 'none';

                if (!resp.ok) {
                    const body = await resp.text();
                    resultsPanel.style.display = '';
                    stepsContainer.innerHTML = `<div class="step-card"><div class="step-header"><span class="step-title" style="color:#ff7070">Error</span></div><div class="step-ai-text"><span>${escapeHtml(body)}</span></div></div>`;
                    return;
                }

                const data = await resp.json();
                resultsPanel.style.display = '';

                for (const step of data.steps) {
                    const card = document.createElement('div');
                    card.className = 'step-card';

                    const hasParsed = step.parsedX != null && step.parsedY != null;
                    const coordText = hasParsed
                        ? `X: ${step.parsedX.toFixed(1)}, Y: ${step.parsedY.toFixed(1)}`
                        : 'parse failed';

                    card.innerHTML = `
                        <div class="step-header">
                            <span class="step-title">Step ${step.stepNumber}</span>
                            <span class="step-coords ${hasParsed ? '' : 'failed'}">${coordText}</span>
                        </div>
                        <div class="step-body">
                            <div class="step-img-col">
                                <span class="img-label">Sent to AI</span>
                                <img src="data:image/png;base64,${step.gridImageBase64}" alt="grid" />
                            </div>
                            <div class="step-img-col">
                                <span class="img-label">AI's Answer Marked</span>
                                <img src="data:image/png;base64,${step.annotatedImageBase64}" alt="annotated" />
                            </div>
                        </div>
                        <div class="step-ai-text">AI response: <span>${escapeHtml(step.aiResponseText)}</span></div>
                    `;

                    card.querySelectorAll('img').forEach(img => {
                        img.addEventListener('click', () => openLightbox(img.src));
                    });

                    stepsContainer.appendChild(card);
                }

                finalResultEl.innerHTML = `
                    <div class="label">Final Screen Coordinates</div>
                    <div class="coords">(${data.finalScreenX.toFixed(1)}, ${data.finalScreenY.toFixed(1)})</div>
                `;

            } catch (err) {
                loadingEl.style.display = 'none';
                resultsPanel.style.display = '';
                stepsContainer.innerHTML = `<div class="step-card"><div class="step-header"><span class="step-title" style="color:#ff7070">Error</span></div><div class="step-ai-text"><span>${escapeHtml(err.message)}</span></div></div>`;
            } finally {
                runBtn.disabled = false;
                updateRunBtn();
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>

</body>
</html>
