<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Test — Thio Agent</title>
    <link rel="stylesheet" href="/css/shared.css">
    <link rel="stylesheet" href="/css/testing-common.css">
    <link rel="stylesheet" href="/css/testing-chat.css">
</head>
<body>

    <header>
        <h1>🧪 Chat Test</h1>
        <a href="/">← Home</a>
        <span id="model-badge" style="font-size:11px;color:#4a6a8a;font-family:'Cascadia Code','Consolas',monospace;margin-left:8px;"></span>
        <a href="/Config.html" style="margin-left:auto;font-size:12px;color:#888;text-decoration:none;border:1px solid #333;border-radius:4px;padding:4px 10px;" title="Open Configuration">⚙ Config</a>
    </header>

    <div id="messages"></div>

    <div id="input-bar">
        <div id="img-preview-row">
            <img id="img-thumbnail" alt="attached" />
            <button id="removeImgBtn">✕ Remove</button>
        </div>
        <div id="input-row">
            <input type="file" id="fileInput" accept="image/*" style="display:none" />
            <button id="attachBtn" title="Attach image (or paste Ctrl+V)">📎</button>
            <textarea id="promptInput" placeholder="Type a prompt… (Ctrl+Enter to send)" rows="1"></textarea>
            <button id="clearBtn">Clear</button>
            <button id="sendBtn">Send</button>
        </div>
    </div>

    <script>
        // @ts-nocheck
        const messagesEl    = document.getElementById('messages');
        const promptInput   = document.getElementById('promptInput');
        const sendBtn       = document.getElementById('sendBtn');
        const clearBtn      = document.getElementById('clearBtn');
        const fileInput     = document.getElementById('fileInput');
        const attachBtn     = document.getElementById('attachBtn');
        const imgPreviewRow = document.getElementById('img-preview-row');
        const imgThumbnail  = document.getElementById('img-thumbnail');
        const removeImgBtn  = document.getElementById('removeImgBtn');

        const CONFIG_KEY = 'tua_config_v1';
        function getStoredConfig() {
            try { return JSON.parse(localStorage.getItem(CONFIG_KEY) || '{}'); } catch { return {}; }
        }

        // Show current model in header badge
        (async () => {
            try {
                const cfg = getStoredConfig();
                const storedModel = cfg?.gemini?.model;
                if (storedModel) {
                    document.getElementById('model-badge').textContent = storedModel;
                } else {
                    const r = await fetch('/api/config');
                    if (r.ok) {
                        const d = await r.json();
                        if (d.gemini?.model) document.getElementById('model-badge').textContent = d.gemini.model;
                    }
                }
            } catch {}
        })();

        let currentConversationId = null;

        appendSystem('Session started. Ctrl+Enter to send.');

        // ---- DOM helpers ----

        function appendSystem(text) {
            const row = document.createElement('div');
            row.className = 'msg-row system';
            const bubble = document.createElement('div');
            bubble.className = 'bubble system';
            bubble.textContent = text;
            row.appendChild(bubble);
            messagesEl.appendChild(row);
            scrollToBottom();
        }

        function appendBubble(role, text, imageDataUrl = null) {
            const row = document.createElement('div');
            row.className = `msg-row ${role}`;

            if (role !== 'system') {
                const label = document.createElement('div');
                label.className = 'msg-label';
                label.textContent = role === 'user' ? 'You' : 'AI';
                row.appendChild(label);
            }

            const bubble = document.createElement('div');
            bubble.className = `bubble ${role}`;

            if (imageDataUrl) {
                const img = document.createElement('img');
                img.src = imageDataUrl;
                img.className = 'bubble-img';
                bubble.appendChild(img);
            }

            bubble.appendChild(document.createTextNode(text));
            row.appendChild(bubble);
            messagesEl.appendChild(row);
            scrollToBottom();
            return bubble;
        }

        function appendThinking() {
            const row = document.createElement('div');
            row.className = 'msg-row ai';

            const label = document.createElement('div');
            label.className = 'msg-label';
            label.textContent = 'AI';

            const bubble = document.createElement('div');
            bubble.className = 'bubble ai thinking';
            bubble.innerHTML = '<span></span><span></span><span></span>';

            row.appendChild(label);
            row.appendChild(bubble);
            messagesEl.appendChild(row);
            scrollToBottom();
            return row;
        }

        function scrollToBottom() {
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        // ---- Image attachment ----

        let attachedImage = null; // { base64, mimeType, dataUrl }

        function attachImageFromFile(file) {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = e => {
                    const dataUrl = e.target.result;
                    attachedImage = {
                        base64:   dataUrl.split(',')[1],
                        mimeType: file.type || 'image/jpeg',
                        dataUrl
                    };
                    imgThumbnail.src = dataUrl;
                    imgPreviewRow.style.display = 'flex';
                    attachBtn.classList.add('has-image');
                    resolve();
                };
                reader.readAsDataURL(file);
            });
        }

        function clearAttachedImage() {
            attachedImage = null;
            imgPreviewRow.style.display = 'none';
            imgThumbnail.src = '';
            fileInput.value = '';
            attachBtn.classList.remove('has-image');
        }

        // ---- Send logic ----

        async function sendPrompt() {
            const prompt = promptInput.value.trim();
            if (!prompt) return;

            const imageSnapshot = attachedImage;
            promptInput.value = '';
            promptInput.style.height = 'auto';
            sendBtn.disabled = true;
            clearAttachedImage();

            appendBubble('user', prompt, imageSnapshot?.dataUrl ?? null);
            const thinkingRow = appendThinking();

            const cfg = getStoredConfig();

            try {
                const response = await fetch('/api/test/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt,
                        apiKey:         cfg?.gemini?.apiKey || null,
                        model:          cfg?.gemini?.model  || null,
                        imageBase64:    imageSnapshot?.base64    ?? null,
                        imageMimeType:  imageSnapshot?.mimeType  ?? null,
                        conversationId: currentConversationId
                    })
                });

                thinkingRow.remove();

                if (!response.ok) {
                    const body = await response.text();
                    appendBubble('error', `HTTP ${response.status}: ${body}`);
                    return;
                }

                const data = await response.json();

                if (data.conversationId && !currentConversationId) {
                    currentConversationId = data.conversationId;
                    appendSystem('\uD83D\uDD17 Conversation started — the AI will remember previous messages.');
                } else if (data.conversationId) {
                    currentConversationId = data.conversationId;
                }

                appendBubble('ai', data.text ?? data.Text ?? '(empty response)');

            } catch (err) {
                thinkingRow.remove();
                appendBubble('error', `Network error: ${err.message}`);
            } finally {
                sendBtn.disabled = false;
                promptInput.focus();
            }
        }

        sendBtn.addEventListener('click', sendPrompt);

        promptInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && e.ctrlKey) {
                e.preventDefault();
                sendPrompt();
            }
        });

        // Auto-expand the textarea as the user types.
        promptInput.addEventListener('input', () => {
            promptInput.style.height = 'auto';
            promptInput.style.height = Math.min(promptInput.scrollHeight, 160) + 'px';
        });

        clearBtn.addEventListener('click', async () => {
            if (currentConversationId) {
                try { await fetch(`/api/test/chat/${currentConversationId}`, { method: 'DELETE' }); } catch { /* best-effort */ }
                currentConversationId = null;
            }
            messagesEl.innerHTML = '';
            clearAttachedImage();
            appendSystem('Chat cleared.');
        });

        attachBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', async () => {
            if (fileInput.files[0]) await attachImageFromFile(fileInput.files[0]);
        });

        removeImgBtn.addEventListener('click', clearAttachedImage);

        // Paste an image directly from the clipboard.
        document.addEventListener('paste', async e => {
            const items = e.clipboardData?.items;
            if (!items) return;
            for (const item of items) {
                if (item.type.startsWith('image/')) {
                    e.preventDefault();
                    const file = item.getAsFile();
                    if (file) await attachImageFromFile(file);
                    break;
                }
            }
        });
    </script>

</body>
</html>
