<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screenshot Test — Thio Agent</title>
    <link rel="stylesheet" href="/css/shared.css">
    <link rel="stylesheet" href="/css/testing-common.css">
    <link rel="stylesheet" href="/css/testing-screenshot.css">
</head>
<body>

    <header>
        <h1>🧪 Screenshot Test</h1>
        <nav>
            <a href="/Testing/Test_Chat.html">Chat Test</a>
            <a href="/">← Viewport</a>
        </nav>
    </header>

    <div id="toolbar">
        <button id="captureBtn">Capture Screenshot</button>
        <span id="status">Ready.</span>
    </div>

    <div id="imageContainer">
        <p id="placeholder">Click "Capture Screenshot" to see the result.</p>
        <img id="screenshot" alt="Captured screenshot" />
    </div>

    <script>
        // @ts-nocheck
        const captureBtn    = document.getElementById('captureBtn');
        const statusEl      = document.getElementById('status');
        const screenshotImg = document.getElementById('screenshot');
        const placeholder   = document.getElementById('placeholder');

        async function capture() {
            captureBtn.disabled = true;
            statusEl.className  = '';
            statusEl.textContent = 'Capturing…';

            try {
                const response = await fetch('/api/test/screenshot');

                if (!response.ok) {
                    const body = await response.text();
                    throw new Error(`HTTP ${response.status}: ${body}`);
                }

                const blob = await response.blob();
                const url  = URL.createObjectURL(blob);

                if (screenshotImg.src) URL.revokeObjectURL(screenshotImg.src);
                screenshotImg.onload = () => URL.revokeObjectURL(url);
                screenshotImg.src = url;
                screenshotImg.style.display = 'block';
                placeholder.style.display   = 'none';

                statusEl.className   = 'ok';
                statusEl.textContent = `Captured at ${new Date().toLocaleTimeString()}`;
            } catch (err) {
                statusEl.className   = 'error';
                statusEl.textContent = err.message;
            } finally {
                captureBtn.disabled = false;
            }
        }

        captureBtn.addEventListener('click', capture);
    </script>

</body>
</html>
