<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Control — Thio Universal Agent</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 24px 32px 18px;
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        header a {
            color: #4a9eff;
            text-decoration: none;
            font-size: 13px;
        }

        header h1 {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
        }

        /* ---- Controls ---- */
        .controls {
            padding: 20px 32px;
            display: flex;
            gap: 12px;
            align-items: center;
            border-bottom: 1px solid #1e1e1e;
        }

        #monitor-select {
            flex: 0 0 190px;
            padding: 10px 10px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 13px;
            outline: none;
            cursor: pointer;
        }

        #monitor-select:focus { border-color: #4a9eff; }

        .controls input[type="text"] {
            flex: 1;
            padding: 10px 14px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
        }

        .controls input[type="text"]:focus {
            border-color: #4a9eff;
        }

        .controls button {
            padding: 10px 22px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }

        #btn-start {
            background: #2c7a2c;
            color: #fff;
        }

        #btn-start:hover { background: #349a34; }

        #btn-start:disabled {
            background: #1a3a1a;
            color: #555;
            cursor: default;
        }

        #btn-stop {
            background: #8a2020;
            color: #fff;
        }

        #btn-stop:hover { background: #a82828; }

        #btn-stop:disabled {
            background: #3a1a1a;
            color: #555;
            cursor: default;
        }

        #btn-pause {
            background: #7a6010;
            color: #fff;
        }

        #btn-pause:hover { background: #9a7a18; }

        #btn-pause:disabled {
            background: #2e2410;
            color: #555;
            cursor: default;
        }

        /* When showing "Resume" state */
        #btn-pause.resuming {
            background: #1a5a8a;
        }

        #btn-pause.resuming:hover { background: #1e72ae; }

        /* ---- Status Bar ---- */
        .status-bar {
            padding: 10px 32px;
            display: flex;
            align-items: center;
            gap: 14px;
            background: #161616;
            border-bottom: 1px solid #1e1e1e;
            font-size: 12px;
            color: #888;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .status-dot.idle { background: #555; }
        .status-dot.running { background: #4a9eff; animation: pulse 1.2s infinite; }
        .status-dot.paused { background: #ccaa22; }
        .status-dot.completed { background: #33aa66; }
        .status-dot.failed { background: #cc4444; }
        .status-dot.cancelled { background: #aa8833; }
        .status-dot.error { background: #cc4444; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        #status-text { font-weight: 600; }

        /* ---- Resume countdown banner ---- */
        #countdown-banner {
            padding: 8px 32px;
            background: #1a1600;
            border-bottom: 1px solid #3a3000;
            font-size: 12px;
            color: #e0c060;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #countdown-banner .countdown-num {
            font-family: 'Cascadia Code', 'Consolas', monospace;
            font-size: 20px;
            font-weight: 700;
            color: #f0d060;
            min-width: 22px;
            text-align: center;
        }

        /* ---- Guidance panel ---- */
        #guidance-panel {
            padding: 8px 32px;
            background: #0e1a0e;
            border-bottom: 1px solid #1e3a1e;
            display: none;
            align-items: center;
            gap: 8px;
        }

        #guidance-panel label {
            font-size: 11px;
            color: #66aa66;
            white-space: nowrap;
            font-weight: 600;
        }

        #guidance-input {
            flex: 1;
            background: #141414;
            border: 1px solid #2a3a2a;
            border-radius: 4px;
            color: #e0e0e0;
            font-size: 12px;
            padding: 5px 10px;
        }

        #guidance-input:focus { outline: none; border-color: #44aa44; }

        #btn-guidance {
            background: #1e4a1e;
            color: #88cc88;
            border: 1px solid #2a5a2a;
            border-radius: 5px;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        #btn-guidance:hover { background: #255a25; }
        #btn-guidance:disabled { background: #161e16; color: #446044; cursor: default; border-color: #1e2e1e; }

        .guidance-ack {
            font-size: 11px;
            color: #44aa44;
            opacity: 0;
            transition: opacity 0.4s;
            white-space: nowrap;
        }

        .guidance-ack.show { opacity: 1; }

        .guidance-cancel-wrap {
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
        }

        .guidance-cancel-wrap input[type=checkbox] {
            accent-color: #cc4444;
            width: 13px;
            height: 13px;
            cursor: pointer;
        }

        .guidance-cancel-wrap span {
            font-size: 11px;
            color: #cc7777;
            font-weight: 600;
        }

        .guidance-cancel-wrap:hover span { color: #ee9999; }

        /* ---- Main Layout ---- */
        main {
            flex: 1;
            padding: 24px 32px;
            display: flex;
            flex-direction: column;
            gap: 0;
            overflow: hidden;
        }

        /* ---- Current Step Card ---- */
        .current-step {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            min-height: 90px;
        }

        .current-step h2 {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #555;
            margin-bottom: 12px;
        }

        .current-step .thought {
            color: #bbb;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .current-step .action {
            font-family: 'Cascadia Code', 'Consolas', monospace;
            font-size: 13px;
            color: #4a9eff;
            background: #111;
            padding: 6px 12px;
            border-radius: 4px;
            display: inline-block;
        }

        .current-step .result {
            margin-top: 8px;
            font-size: 12px;
            color: #777;
        }

        /* ---- Live Sub-Steps ---- */
        .live-substeps {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 400px;
            overflow-y: auto;
        }

        .live-substeps:empty {
            display: none;
        }

        .live-substep-header {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #c084fc;
            margin-bottom: 4px;
        }

        /* ---- Step Log ---- */
        .step-log-header {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #555;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #btn-copy-steps {
            padding: 3px 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            color: #888;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }

        #btn-copy-steps:hover {
            background: #1e1e2e;
            color: #c084fc;
            border-color: #6040a0;
        }

        #btn-copy-steps.copied {
            color: #55cc77;
            border-color: #2c7a2c;
            background: #1a2e1a;
        }

        .step-log {
            flex: 1;
            overflow-y: auto;
            border: 1px solid #222;
            border-radius: 6px;
            background: #141414;
        }

        .step-entry {
            padding: 12px 16px;
            border-bottom: 1px solid #1c1c1c;
            font-size: 13px;
        }

        .step-entry:last-child {
            border-bottom: none;
        }

        .step-entry .step-num {
            color: #555;
            font-weight: 600;
            margin-right: 8px;
        }

        .step-entry .step-action {
            font-family: 'Cascadia Code', 'Consolas', monospace;
            color: #4a9eff;
            font-size: 12px;
        }

        .step-entry .step-thought {
            color: #888;
            font-size: 12px;
            margin-top: 4px;
        }

        .step-entry .step-result {
            color: #666;
            font-size: 11px;
            margin-top: 2px;
        }

        .step-entry.cancelled {
            border-left: 3px solid #885500;
            opacity: 0.85;
        }

        .step-entry.cancelled .step-result {
            color: #cc8833;
        }

        /* ---- Final Result Banner ---- */
        .final-result {
            padding: 14px 20px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 14px;
            font-weight: 600;
            display: none;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .final-result.completed {
            background: #1a2e1a;
            border: 1px solid #2c7a2c;
            color: #55cc77;
            display: flex;
        }

        .final-result.failed, .final-result.error {
            background: #2e1a1a;
            border: 1px solid #8a2020;
            color: #cc5555;
            display: flex;
        }

        .final-result.cancelled {
            background: #2e2a1a;
            border: 1px solid #8a7020;
            color: #ccaa55;
            display: flex;
        }

        .final-result-msg {
            flex: 1;
            min-width: 0;
        }

        .final-result-time {
            font-family: 'Cascadia Code', 'Consolas', monospace;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            white-space: nowrap;
            flex-shrink: 0;
            opacity: 0.85;
        }

        /* ---- Debug Panel ---- */
        .debug-toggle {
            margin-top: 8px;
        }

        .debug-toggle summary {
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #c084fc;
            padding: 4px 0;
            user-select: none;
        }

        .debug-toggle summary:hover { color: #d8b4fe; }

        /* ---- Prompt Banner ---- */
        .prompt-banner {
            padding: 0 32px;
            background: #161616;
            border-bottom: 1px solid #1e1e1e;
        }

        .prompt-banner details {
            padding: 6px 0;
        }

        .prompt-banner summary {
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #555;
            user-select: none;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .prompt-banner summary::-webkit-details-marker { display: none; }

        .prompt-banner summary::before {
            content: '▶';
            font-size: 8px;
            transition: transform 0.15s;
            color: #444;
        }

        .prompt-banner details[open] summary::before {
            transform: rotate(90deg);
        }

        .prompt-banner summary .prompt-preview {
            color: #888;
            font-weight: 400;
            text-transform: none;
            letter-spacing: 0;
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 700px;
        }

        .prompt-banner .prompt-full {
            margin-top: 8px;
            padding: 10px 14px;
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            font-size: 14px;
            line-height: 1.6;
            color: #ddd;
            white-space: pre-wrap;
            word-break: break-word;
            margin-bottom: 6px;
        }

        .debug-entries {
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .debug-entry {
            background: #0d0d0d;
            border: 1px solid #1f1f1f;
            border-radius: 4px;
            padding: 8px 12px;
        }

        .debug-entry-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: #c084fc;
            margin-bottom: 4px;
        }

        .debug-entry-text {
            font-family: 'Cascadia Code', 'Consolas', monospace;
            font-size: 11px;
            color: #aaa;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 300px;
            overflow-y: auto;
            line-height: 1.5;
        }

        .debug-entry-img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 4px;
            border: 1px solid #222;
            margin-top: 4px;
            cursor: pointer;
        }

        .debug-entry-img.expanded {
            max-height: none;
            max-width: 100%;
        }

        .debug-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            color: #c084fc;
            background: #1a0d2e;
            border: 1px solid #2d1a4e;
            border-radius: 3px;
            padding: 1px 6px;
            margin-left: 8px;
            vertical-align: middle;
        }

        .step-duration {
            font-size: 10px;
            font-weight: 600;
            color: #4a7a4a;
            margin-left: 8px;
            font-family: 'Cascadia Code', 'Consolas', monospace;
        }

        .step-timings {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 6px;
        }

        .timing-pill {
            font-size: 10px;
            font-family: 'Cascadia Code', 'Consolas', monospace;
            padding: 1px 7px;
            border-radius: 10px;
            white-space: nowrap;
        }

        .timing-ai    { background: #0d2035; color: #4a9eff; border: 1px solid #1a3a5c; }
        .timing-parse { background: #1a1a0a; color: #a0a030; border: 1px solid #3a3a10; }
        .timing-exec  { background: #0d200d; color: #4a9a4a; border: 1px solid #1a4a1a; }
        .timing-coord { background: #200d20; color: #b060c0; border: 1px solid #4a1a4a; }

        /* ---- Queue badge on the action label ---- */
        .queue-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            color: #f0c040;
            background: #2a2000;
            border: 1px solid #5a4a00;
            border-radius: 3px;
            padding: 1px 6px;
            margin-left: 6px;
            vertical-align: middle;
            font-family: 'Cascadia Code', 'Consolas', monospace;
        }

        /* ---- Nested queued sub-steps ---- */
        .queue-substeps {
            margin-top: 8px;
        }

        .queue-substeps summary {
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #f0c040;
            padding: 3px 0;
            user-select: none;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .queue-substeps summary::-webkit-details-marker { display: none; }

        .queue-substeps summary::before {
            content: '▶';
            font-size: 8px;
            transition: transform 0.15s;
            color: #a08020;
        }

        .queue-substeps[open] summary::before { transform: rotate(90deg); }
        .queue-substeps summary:hover { color: #ffd84a; }

        .queue-substep-list {
            margin-top: 6px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding-left: 12px;
            border-left: 2px solid #3a3000;
        }

        .queue-substep-item {
            background: #0f0f00;
            border: 1px solid #2a2500;
            border-radius: 4px;
            padding: 7px 10px;
        }

        .queue-substep-action {
            font-family: 'Cascadia Code', 'Consolas', monospace;
            font-size: 12px;
            color: #e0c060;
        }

        .queue-substep-result {
            font-size: 11px;
            color: #666;
            margin-top: 2px;
        }

        #elapsed-timer {
            margin-left: auto;
            font-family: 'Cascadia Code', 'Consolas', monospace;
            font-size: 12px;
            color: #4a6a8a;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<header>
    <a href="/">&larr; Home</a>
    <h1>Agent Control</h1>
    <div style="margin-left:auto;display:flex;align-items:center;gap:14px;">
        <span id="model-badge" style="font-size:11px;color:#4a6a8a;font-family:'Cascadia Code','Consolas',monospace;"></span>
        <a href="/Config.html" style="font-size:12px;color:#888;text-decoration:none;border:1px solid #333;border-radius:4px;padding:4px 10px;" title="Open Configuration">⚙ Config</a>
    </div>
</header>

<div class="controls">
    <select id="monitor-select" title="Monitor to capture"></select>
    <input type="text" id="goal-input" placeholder="Enter a goal for the AI agent..." />
    <button id="btn-start">Start</button>
    <button id="btn-pause" disabled>Pause</button>
    <button id="btn-stop" disabled>Stop</button>
    <button id="btn-new-session" style="background:#2a2a2a;color:#888;border:1px solid #444;border-radius:6px;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;margin-left:auto;" title="Stop current session and clear output">New Session</button>
</div>

<div class="status-bar">
    <div class="status-dot idle" id="status-dot"></div>
    <span id="status-text">Idle</span>
    <span id="step-counter"></span>
    <span id="elapsed-timer"></span>
</div>

<div id="countdown-banner" style="display:none;">
    <span>▶ Resuming in</span>
    <span class="countdown-num" id="countdown-num">5</span>
    <span>seconds&hellip;</span>
</div>

<div id="guidance-panel">
    <label for="guidance-input">&#128172; Guidance</label>
    <input type="text" id="guidance-input" placeholder="Send a mid-session instruction to the AI&hellip;" />
    <label class="guidance-cancel-wrap" title="Cancel the next pending action and redirect the AI with your guidance">
        <input type="checkbox" id="guidance-cancel" />
        <span>Cancel next action</span>
    </label>
    <button id="btn-guidance">Send</button>
    <span class="guidance-ack" id="guidance-ack">&#10003; Queued</span>
</div>

<div class="prompt-banner" id="prompt-banner" style="display:none;">
    <details id="prompt-details">
        <summary>Goal&nbsp;<span class="prompt-preview" id="prompt-preview"></span></summary>
        <div class="prompt-full" id="prompt-full"></div>
    </details>
</div>

<main>
    <div class="final-result" id="final-result"><span class="final-result-msg" id="final-result-msg"></span><span class="final-result-time" id="final-result-time"></span></div>

    <div class="current-step" id="current-step">
        <h2>Current Step</h2>
        <div class="thought" id="current-thought">Waiting for agent to start...</div>
        <div class="action" id="current-action" style="display:none;"></div>
        <div class="result" id="current-result"></div>
        <div class="live-substeps" id="live-substeps"></div>
    </div>

    <div class="step-log-header"><span>Step History</span><button id="btn-copy-steps" title="Copy all steps as JSON">Copy</button></div>
    <div class="step-log" id="step-log"></div>
</main>

<script>
    // @ts-nocheck
    const monitorSelect = document.getElementById('monitor-select');
    const goalInput = document.getElementById('goal-input');
    const btnStart = document.getElementById('btn-start');
    // @ts-ignore
    const countdownBanner = document.getElementById('countdown-banner');
    // @ts-ignore
    const countdownNum = document.getElementById('countdown-num');
    const btnPause = document.getElementById('btn-pause');
    const btnStop = document.getElementById('btn-stop');
    const btnNewSession = document.getElementById('btn-new-session');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const stepCounter = document.getElementById('step-counter');
    const finalResultEl = document.getElementById('final-result');
    const finalResultMsg = document.getElementById('final-result-msg');
    const finalResultTime = document.getElementById('final-result-time');
    const currentThought = document.getElementById('current-thought');
    const currentAction = document.getElementById('current-action');
    const currentResult = document.getElementById('current-result');
    const liveSubsteps = document.getElementById('live-substeps');
    const stepLog = document.getElementById('step-log');
    const promptBanner = document.getElementById('prompt-banner');
    const promptPreview = document.getElementById('prompt-preview');
    const promptFull = document.getElementById('prompt-full');
    const elapsedTimer = document.getElementById('elapsed-timer');
    const modelBadge = document.getElementById('model-badge');
    const guidancePanel = document.getElementById('guidance-panel');
    const guidanceInput = document.getElementById('guidance-input');
    const btnGuidance = document.getElementById('btn-guidance');
    const guidanceAck = document.getElementById('guidance-ack');

    const SESSION_STORE_KEY = 'tua_session_id';
    const CONFIG_STORE_KEY  = 'tua_config_v1';

    function getStoredConfig() {
        try { return JSON.parse(localStorage.getItem(CONFIG_STORE_KEY) || '{}'); } catch { return {}; }
    }

    async function pushConfigToServer() {
        const cfg = getStoredConfig();
        if (!cfg || Object.keys(cfg).length === 0) return;
        try {
            await fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(cfg),
            });
        } catch { /* best effort */ }
    }

    let sessionId = null;
    let eventSource = null;
    let debugEnabled = false;
    let stepsData = [];
    let sessionGoal = '';
    let sessionFinalResult = '';
    let isPaused = false;
    let sessionStartTime = null;
    let elapsedIntervalId = null;

    // ── Boot: fetch server config + try to resume a stored session ──────────
    (async () => {
        try {
            const [cfgRes, dbgRes, monRes] = await Promise.all([
                fetch('/api/config'),
                fetch('/api/agent/debug-enabled'),
                fetch('/api/agent/monitors'),
            ]);

            if (cfgRes.ok) {
                const cfg = await cfgRes.json();
                const storedModel = getStoredConfig()?.gemini?.model;
                const model = storedModel || cfg.gemini?.model || '';
                if (model) modelBadge.textContent = model;
            }

            if (dbgRes.ok) {
                const data = await dbgRes.json();
                debugEnabled = !!data.enabled;
                if (debugEnabled) statusText.textContent = 'Idle (Debug Mode)';
            }

            monitorSelect.innerHTML = '<option value="">All Monitors</option>';
            if (monRes.ok) {
                const monitors = await monRes.json();
                for (const m of monitors) {
                    const opt = document.createElement('option');
                    opt.value = m.index;
                    opt.textContent = `Monitor ${m.index}${m.isPrimary ? ' (Primary)' : ''} — ${m.width}\u00d7${m.height}`;
                    monitorSelect.appendChild(opt);
                }
            }
        } catch { /* non-critical */ }

        // ── Session recovery ────────────────────────────────────────────────
        const storedSid = localStorage.getItem(SESSION_STORE_KEY);
        if (storedSid) {
            try {
                const statusRes = await fetch(`/api/agent/${storedSid}/status`);
                if (!statusRes.ok) throw new Error('not found');
                const status = await statusRes.json();

                sessionId   = storedSid;
                sessionGoal = status.goal || '';

                goalInput.value = sessionGoal;
                promptPreview.textContent = sessionGoal.length > 80 ? sessionGoal.slice(0, 80) + '\u2026' : sessionGoal;
                promptFull.textContent = sessionGoal;
                promptBanner.style.display = '';

                const isActive = status.status === 'Running';
                const isPausedStatus = status.isPaused;

                if (isActive) {
                    sessionStartTime = status.startedAt ? new Date(status.startedAt).getTime() : Date.now();
                    clearInterval(elapsedIntervalId);
                    elapsedIntervalId = setInterval(() => {
                        elapsedTimer.textContent = formatElapsed(Date.now() - sessionStartTime);
                    }, 500);

                    setStatus('running', debugEnabled ? 'Running (Debug Mode)' : 'Running');
                    btnStart.disabled  = true;
                    btnPause.disabled  = false;
                    btnStop.disabled   = false;
                    goalInput.disabled = true;
                    monitorSelect.disabled = true;
                    guidancePanel.style.display = 'flex';
                    guidanceInput.value = '';

                    if (isPausedStatus) {
                        isPaused = true;
                        btnPause.textContent = 'Resume';
                        btnPause.classList.add('resuming');
                        setStatus('paused', debugEnabled ? 'Paused (Debug Mode)' : 'Paused');
                    }
                } else {
                    // Show the final result immediately from the status response so it
                    // appears before the SSE step history finishes replaying.
                    const sk = status.status.toLowerCase();
                    if (status.totalDurationMs != null) sessionStartTime = Date.now() - status.totalDurationMs;
                    setStatus(sk, status.status);
                    if (status.finalResult) showFinalResult(sk, status.finalResult);
                    resetControls();
                }

                // Connect SSE: for running sessions this streams live events; for
                // terminated sessions it replays all steps and fires the done event.
                connectStream(storedSid);
            } catch {
                // Session expired (server restarted or id stale) — silently clear
                localStorage.removeItem(SESSION_STORE_KEY);
            }
        }
    })();

    goalInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !btnStart.disabled) startAgent();
    });

    btnStart.addEventListener('click', startAgent);
    btnPause.addEventListener('click', togglePause);
    btnStop.addEventListener('click', stopAgent);
    btnNewSession.addEventListener('click', newSession);
    document.getElementById('btn-copy-steps').addEventListener('click', copySteps);
    btnGuidance.addEventListener('click', sendGuidance);
    guidanceInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendGuidance(); });

    async function startAgent() {
        const goal = goalInput.value.trim();
        if (!goal) return;

        await pushConfigToServer();

        const cfg = getStoredConfig();
        const apiKey = cfg?.gemini?.apiKey || null;
        const model  = cfg?.gemini?.model  || null;

        // Clear any previous session from storage so a fresh session takes over
        localStorage.removeItem(SESSION_STORE_KEY);

        // Reset UI
        stepsData = [];
        sessionGoal = goal;
        sessionFinalResult = '';
        isPaused = false;
        sessionStartTime = Date.now();
        elapsedTimer.textContent = '0:00';
        clearInterval(elapsedIntervalId);
        elapsedIntervalId = setInterval(() => {
            elapsedTimer.textContent = formatElapsed(Date.now() - sessionStartTime);
        }, 500);
        stepLog.innerHTML = '';
        promptPreview.textContent = goal.length > 80 ? goal.slice(0, 80) + '…' : goal;
        promptFull.textContent = goal;
        promptBanner.style.display = '';
        document.getElementById('prompt-details').removeAttribute('open');
        finalResultEl.className = 'final-result';
        finalResultMsg.textContent = '';
        finalResultTime.textContent = '';
        finalResultEl.style.display = 'none';
        currentThought.textContent = 'Starting...';
        currentAction.style.display = 'none';
        currentAction.textContent = '';
        currentResult.textContent = '';
        liveSubsteps.innerHTML = '';
        stepCounter.textContent = '';
        setStatus('running', debugEnabled ? 'Running (Debug Mode)' : 'Running');

        btnStart.disabled = true;
        btnPause.disabled = false;
        btnPause.textContent = 'Pause';
        btnPause.classList.remove('resuming');
        btnStop.disabled = false;
        goalInput.disabled = true;
        monitorSelect.disabled = true;
        guidancePanel.style.display = 'flex';
        guidanceInput.value = '';

        try {
            const res = await fetch('/api/agent/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    goal,
                    apiKey,
                    model,
                    monitorIndex: monitorSelect.value !== '' ? parseInt(monitorSelect.value, 10) : null,
                }),
            });

            if (!res.ok) {
                const err = await res.json();
                showFinalResult('error', err.error || 'Failed to start agent.');
                resetControls();
                return;
            }

            const data = await res.json();
            sessionId = data.sessionId;
            localStorage.setItem(SESSION_STORE_KEY, sessionId);

            connectStream(sessionId);
        } catch (err) {
            showFinalResult('error', 'Network error: ' + err.message);
            resetControls();
        }
    }

    function connectStream(id) {
        if (eventSource) { eventSource.close(); eventSource = null; }
        eventSource = new EventSource(`/api/agent/${id}/stream`);
        eventSource.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.type === 'stepStarting') handleStepStarting(msg);
            else if (msg.type === 'subStep') handleSubStep(msg);
            else if (msg.type === 'step') handleStep(msg);
            else if (msg.type === 'paused') handlePaused();
            else if (msg.type === 'resumed') handleResumed();
            else if (msg.type === 'countdown') handleCountdown(msg);
            else if (msg.type === 'guidanceQueued') handleGuidanceQueued(msg);
            else if (msg.type === 'done') handleDone(msg);
        };
        eventSource.onerror = () => {
            eventSource.close();
            eventSource = null;
            if (statusText.textContent.startsWith('Running')) {
                setStatus('error', 'Connection lost');
                resetControls();
            }
        };
    }

    async function stopAgent() {
        if (!sessionId) return;
        btnStop.disabled = true;
        try {
            await fetch(`/api/agent/${sessionId}/stop`, { method: 'POST' });
        } catch { /* best effort */ }
    }

    async function newSession() {
        // Cancel any in-progress session first (best effort)
        if (sessionId) {
            try { await fetch(`/api/agent/${sessionId}/stop`, { method: 'POST' }); } catch { /* best effort */ }
        }

        // Drop the SSE connection and clear persisted session key
        if (eventSource) { eventSource.close(); eventSource = null; }
        localStorage.removeItem(SESSION_STORE_KEY);
        sessionId = null;
        sessionGoal = '';
        sessionFinalResult = '';
        isPaused = false;
        stepsData = [];
        stopElapsedTimer(null);
        elapsedTimer.textContent = '';

        // Reset all UI
        stepLog.innerHTML = '';
        promptBanner.style.display = 'none';
        countdownBanner.style.display = 'none';
        finalResultEl.className = 'final-result';
        finalResultEl.style.display = 'none';
        finalResultMsg.textContent = '';
        finalResultTime.textContent = '';
        currentThought.textContent = 'Waiting for agent to start...';
        currentAction.style.display = 'none';
        currentAction.textContent = '';
        currentResult.textContent = '';
        liveSubsteps.innerHTML = '';
        stepCounter.textContent = '';
        goalInput.value = '';
        setStatus('idle', debugEnabled ? 'Idle (Debug Mode)' : 'Idle');
        resetControls();
    }

    async function togglePause() {
        if (!sessionId) return;
        btnPause.disabled = true;
        try {
            if (isPaused) {
                await pushConfigToServer();
                await fetch(`/api/agent/${sessionId}/resume`, { method: 'POST' });
            } else {
                await fetch(`/api/agent/${sessionId}/pause`, { method: 'POST' });
            }
        } catch { /* best effort */ } finally {
            btnPause.disabled = false;
        }
    }

    async function sendGuidance() {
        if (!sessionId) return;
        const msg = guidanceInput.value.trim();
        if (!msg) return;
        const cancelNext = document.getElementById('guidance-cancel').checked;
        btnGuidance.disabled = true;
        try {
            const res = await fetch(`/api/agent/${sessionId}/guidance`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: msg, cancelNextAction: cancelNext }),
            });
            if (res.ok) {
                guidanceInput.value = '';
                document.getElementById('guidance-cancel').checked = false;
                handleGuidanceQueued(msg, cancelNext);
            } else {
                const body = await res.json().catch(() => ({}));
                const ackEl = document.getElementById('guidance-ack');
                ackEl.textContent = '\u26a0 ' + (body.error ?? 'Failed to send');
                ackEl.style.color = '#cc6644';
                ackEl.classList.add('show');
                setTimeout(() => { ackEl.classList.remove('show'); ackEl.style.color = ''; ackEl.textContent = '\u2713 Queued'; }, 3000);
            }
        } catch { /* network error — silently ignore */ } finally {
            btnGuidance.disabled = false;
        }
    }

    function handleGuidanceQueued(_msg, cancelNext) {
        const ackEl = document.getElementById('guidance-ack');
        ackEl.textContent = cancelNext ? '\u26a0 Queued (will cancel next action)' : '\u2713 Queued';
        ackEl.style.color = cancelNext ? '#cc9944' : '';
        ackEl.classList.remove('show');
        // Force reflow so the transition re-fires if sent multiple times quickly
        void ackEl.offsetWidth;
        ackEl.classList.add('show');
        setTimeout(() => { ackEl.classList.remove('show'); ackEl.style.color = ''; ackEl.textContent = '\u2713 Queued'; }, 2500);
    }

    function handlePaused() {
        isPaused = true;
        btnPause.textContent = 'Resume';
        btnPause.classList.add('resuming');
        setStatus('paused', debugEnabled ? 'Paused (Debug Mode)' : 'Paused');
    }

    function handleResumed() {
        isPaused = false;
        btnPause.textContent = 'Pause';
        btnPause.classList.remove('resuming');
        setStatus('running', debugEnabled ? 'Running (Debug Mode)' : 'Running');
        // Countdown will appear via countdown events; clear any leftover banner just in case.
        countdownBanner.style.display = 'none';
    }

    function handleCountdown(msg) {
        if (msg.seconds > 0) {
            countdownNum.textContent = msg.seconds;
            countdownBanner.style.display = 'flex';
        } else {
            countdownBanner.style.display = 'none';
        }
    }

    function handleStepStarting(msg) {
        stepCounter.textContent = `Step ${msg.stepNumber}`;

        currentThought.textContent = msg.thought;
        const queueBadge = (msg.queueSize > 1) ? ` <span class="queue-badge">QUEUE ×${msg.queueSize}</span>` : '';
        currentAction.innerHTML = escapeHtml(msg.action) + queueBadge;
        currentAction.style.display = 'inline-block';
        currentResult.textContent = 'Executing…';
        liveSubsteps.innerHTML = '';
    }

    function handleSubStep(msg) {
        if (!debugEnabled && !msg.imageBase64) return;

        const entry = document.createElement('div');
        entry.className = 'debug-entry';

        let html = `<div class="debug-entry-label">${escapeHtml(msg.label)}</div>`;
        if (msg.text) {
            html += `<div class="debug-entry-text">${escapeHtml(msg.text)}</div>`;
        }
        if (msg.imageBase64) {
            html += `<img class="debug-entry-img" src="data:image/png;base64,${msg.imageBase64}" alt="${escapeHtml(msg.label)}" title="Click to expand" />`;
        }

        entry.innerHTML = html;
        entry.querySelectorAll('.debug-entry-img').forEach(img => {
            img.addEventListener('click', () => img.classList.toggle('expanded'));
        });

        // Show a header if this is the first sub-step
        if (liveSubsteps.children.length === 0) {
            const header = document.createElement('div');
            header.className = 'live-substep-header';
            header.textContent = 'Live Progress';
            liveSubsteps.appendChild(header);
        }

        liveSubsteps.appendChild(entry);
        liveSubsteps.scrollTop = liveSubsteps.scrollHeight;
    }

    function handleStep(msg) {
        stepsData.push(msg);
        stepCounter.textContent = `Step ${msg.stepNumber}`;

        liveSubsteps.innerHTML = '';

        currentThought.textContent = msg.thought;
        const queueBadge = (msg.queuedSubSteps && msg.queuedSubSteps.length > 1)
            ? ` <span class="queue-badge">QUEUE ×${msg.queuedSubSteps.length}</span>` : '';
        currentAction.innerHTML = escapeHtml(msg.action) + queueBadge;
        currentAction.style.display = 'inline-block';
        currentResult.textContent = msg.result;

        const entry = document.createElement('div');
        const isCancelled = !msg.success && !msg.isTerminal && msg.result === 'Action cancelled by user.';
        entry.className = 'step-entry' + (isCancelled ? ' cancelled' : '');

        let html = `
            <span class="step-num">#${msg.stepNumber}</span>
            <span class="step-action">${escapeHtml(msg.action)}${queueBadge}</span>
            <span class="step-duration">${formatDuration(msg.durationMs)}</span>
            <div class="step-thought">${escapeHtml(msg.thought)}</div>
            <div class="step-result">${escapeHtml(msg.result)}</div>
        `;

        if (msg.timings) {
            const t = msg.timings;
            let timingsHtml = '<div class="step-timings">';
            timingsHtml += `<span class="timing-pill timing-ai" title="Time for AI to respond">AI&nbsp;${formatDuration(t.aiResponseMs)}</span>`;
            timingsHtml += `<span class="timing-pill timing-parse" title="Time to parse AI response">Parse&nbsp;${formatDuration(t.parseMs)}</span>`;
            timingsHtml += `<span class="timing-pill timing-exec" title="Time to execute action">Exec&nbsp;${formatDuration(t.executionMs)}</span>`;
            if (t.coordResolutionMs != null)
                timingsHtml += `<span class="timing-pill timing-coord" title="Coord resolution (subset of Exec)">Coord&nbsp;${formatDuration(t.coordResolutionMs)}</span>`;
            timingsHtml += '</div>';
            html += timingsHtml;
        }

        // Nested expandable queue sub-steps
        if (msg.queuedSubSteps && msg.queuedSubSteps.length > 1) {
            html += renderQueuedSubSteps(msg.queuedSubSteps);
        }

        if (msg.debugLog && msg.debugLog.length > 0) {
            const visibleEntries = debugEnabled
                ? msg.debugLog
                : msg.debugLog.filter(e => e.imageBase64);
            if (visibleEntries.length > 0) {
                html += renderDebugLog(visibleEntries);
            }
        }

        entry.innerHTML = html;

        entry.querySelectorAll('.debug-entry-img').forEach(img => {
            img.addEventListener('click', () => img.classList.toggle('expanded'));
        });

        stepLog.appendChild(entry);
        stepLog.scrollTop = stepLog.scrollHeight;

        if (msg.isTerminal) {
            const status = msg.goalAchieved ? 'completed' : 'failed';
            sessionFinalResult = msg.result;
            setStatus(status, msg.goalAchieved ? 'Completed' : 'Failed');
            showFinalResult(status, msg.result);
            stopElapsedTimer(null);
            cleanup();
        }
    }

    function renderQueuedSubSteps(subSteps) {
        let html = `<details class="queue-substeps"><summary>Queued Actions <span class="queue-badge">${subSteps.length} actions</span></summary><div class="queue-substep-list">`;
        for (const s of subSteps) {
            const ok = s.success;
            html += `<div class="queue-substep-item">`;
            html += `<div class="queue-substep-action">${escapeHtml(s.action)}<span class="step-duration">&nbsp;${formatDuration(s.durationMs)}</span></div>`;
            html += `<div class="queue-substep-result">${ok ? '✓' : '✗'}&nbsp;${escapeHtml(s.result)}</div>`;
            if (s.debugLog && debugEnabled) {
                const vis = s.debugLog.filter(e => e.text || e.imageBase64);
                if (vis.length > 0) html += renderDebugLog(vis);
            }
            html += `</div>`;
        }
        html += `</div></details>`;
        return html;
    }

    function renderDebugLog(entries) {
        let html = `<details class="debug-toggle"><summary>Debug Info <span class="debug-badge">${entries.length} entries</span></summary><div class="debug-entries">`;

        for (const e of entries) {
            html += `<div class="debug-entry">`;
            html += `<div class="debug-entry-label">${escapeHtml(e.label)}</div>`;

            if (e.text) {
                html += `<div class="debug-entry-text">${escapeHtml(e.text)}</div>`;
            }

            if (e.imageBase64) {
                html += `<img class="debug-entry-img" src="data:image/png;base64,${e.imageBase64}" alt="${escapeHtml(e.label)}" title="Click to expand" />`;
            }

            html += `</div>`;
        }

        html += `</div></details>`;
        return html;
    }

    function handleDone(msg) {
        const statusKey = msg.status.toLowerCase();
        if (msg.finalResult) sessionFinalResult = msg.finalResult;
        setStatus(statusKey, msg.status);
        if (msg.finalResult) showFinalResult(statusKey, msg.finalResult);
        stopElapsedTimer(msg.totalDurationMs);
        localStorage.removeItem(SESSION_STORE_KEY);
        cleanup();
    }

    async function copySteps() {
        if (stepsData.length === 0) return;
        const btn = document.getElementById('btn-copy-steps');

        const output = {
            goal: sessionGoal,
            status: statusText.textContent,
            ...(sessionFinalResult ? { finalResult: sessionFinalResult } : {}),
            steps: stepsData.map(s => {
                const step = {
                    stepNumber: s.stepNumber,
                    thought: s.thought,
                    action: s.action,
                    result: s.result,
                    durationMs: s.durationMs,
                };
                if (s.timings) step.timings = s.timings;
                if (s.isTerminal) step.isTerminal = true;
                if (s.goalAchieved != null) step.goalAchieved = s.goalAchieved;
                if (s.debugLog?.length) {
                    step.debugLog = s.debugLog.map(d => {
                        const entry = { label: d.label };
                        if (d.text) entry.text = d.text;
                        if (d.imageBase64) entry.image = '[image data omitted]';
                        return entry;
                    });
                }
                return step;
            }),
        };

        const json = JSON.stringify(output, null, 2);
        try {
            await navigator.clipboard.writeText(json);
        } catch {
            const ta = document.createElement('textarea');
            ta.value = json;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
        }
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
    }

    function stopElapsedTimer(totalDurationMs) {
        clearInterval(elapsedIntervalId);
        elapsedIntervalId = null;
        const finalMs = totalDurationMs != null ? totalDurationMs
            : sessionStartTime ? Date.now() - sessionStartTime : null;
        if (finalMs != null) {
            elapsedTimer.textContent = formatElapsed(finalMs);
            finalResultTime.textContent = formatElapsed(finalMs);
        }
    }

    function formatElapsed(ms) {
        if (ms == null) return '';
        const totalSec = Math.floor(ms / 1000);
        const h = Math.floor(totalSec / 3600);
        const m = Math.floor((totalSec % 3600) / 60);
        const s = totalSec % 60;
        if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        return `${m}:${String(s).padStart(2,'0')}`;
    }

    function formatDuration(ms) {
        if (ms == null) return '';
        if (ms < 1000) return `${ms}ms`;
        return `${(ms / 1000).toFixed(1)}s`;
    }

    function setStatus(key, label) {
        statusDot.className = 'status-dot ' + key;
        statusText.textContent = label;
    }

    function showFinalResult(statusKey, message) {
        finalResultEl.className = 'final-result ' + statusKey;
        finalResultMsg.textContent = message;
        finalResultTime.textContent = '';
        finalResultEl.style.display = 'flex';
    }

    function cleanup() {
        if (eventSource) {
            eventSource.close();
            eventSource = null;
        }
        countdownBanner.style.display = 'none';
        resetControls();
    }

    function resetControls() {
        btnStart.disabled = false;
        btnPause.disabled = true;
        btnPause.textContent = 'Pause';
        btnPause.classList.remove('resuming');
        btnStop.disabled = true;
        goalInput.disabled = false;
        monitorSelect.disabled = false;
        guidancePanel.style.display = 'none';
        guidanceAck.classList.remove('show');
    }

    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }
</script>

</body>
</html>
